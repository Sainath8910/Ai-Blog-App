{% extends "base.html" %}
{% load static %}

{% block title %}
Sign Up
{% endblock %}

{% block content %}

<h1>Sign Up</h1>

<input
    type="email"
    id="email"
    placeholder="Email"
>

<br><br>

<input
    type="password"
    id="password"
    placeholder="Password"
>

<br><br>

<button id="signupBtn">
    Sign Up
</button>

<br><br>

<button id="googleBtn">
    Continue with Google
</button>

<br><br>

<button id="githubBtn">
    Continue with GitHub
</button>

<br><br>

<a href="/login/">
    Already have an account? Login
</a>

<script>
    window.SUPABASE_URL = "{{ SUPABASE_URL|escapejs }}";
    window.SUPABASE_ANON_KEY = "{{ SUPABASE_ANON_KEY|escapejs }}";
</script>

{% endblock %}

{% block scripts %}

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="{% static 'js/config.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script src="{% static 'js/signup.js' %}"></script>

{% endblock %}
