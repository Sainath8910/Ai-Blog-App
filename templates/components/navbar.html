<header
class="sticky top-0 z-40 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">

<div class="px-8 h-20 flex items-center justify-between">

    <!-- Left -->

    <div class="flex items-center gap-5">

        <button
        id="sidebarToggle"
        class="lg:hidden">

            <i data-lucide="menu"></i>

        </button>


    </div>

    <!-- Right -->

    <div class="flex items-center gap-5">

        <!-- Theme -->

        <button
            id="themeToggle"
            class="rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800">

            <i
                id="moonIcon"
                data-lucide="moon"
                class="w-5 h-5">
            </i>

            <i
                id="sunIcon"
                data-lucide="sun"
                class="w-5 h-5 hidden">
            </i>

        </button>

        <!-- Notifications -->

        <button
        class="relative rounded-xl p-2 hover:bg-slate-100 dark:hover:bg-slate-800">

            <i
            data-lucide="bell"
            class="w-5 h-5">

            </i>

            <span
            class="absolute right-2 top-2 h-2 w-2 rounded-full bg-red-500">

            </span>

        </button>

        <!-- User -->

        <div
        class="flex items-center gap-3">

            <img

            src="https://ui-avatars.com/api/?name=User&background=2563eb&color=fff"

            class="w-11 h-11 rounded-full"

            >

            <div class="hidden md:block">

                <div class="font-semibold">

                    {% if CURRENT_USER %}

                        {{ CURRENT_USER.email }}

                    {% else %}

                        Guest

                    {% endif %}

                </div>

                <div
                class="text-sm text-gray-500">

                    AI Blog Creator

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const themeButton = document.getElementById("themeToggle");
const themeIcon = document.getElementById("themeIcon");

function updateThemeIcon() {
    if (document.documentElement.classList.contains("dark")) {
        themeIcon.setAttribute("data-lucide", "sun");
    } else {
        themeIcon.setAttribute("data-lucide", "moon");
    }

    lucide.createIcons();
}

themeButton.addEventListener("click", () => {

    document.documentElement.classList.toggle("dark");

    if (document.documentElement.classList.contains("dark")) {
        localStorage.setItem("theme", "dark");
    } else {
        localStorage.setItem("theme", "light");
    }

    updateThemeIcon();

});

// Set correct icon when page loads
updateThemeIcon();
</script>

</header>
