<div
    id="exportModal"
    class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/50 backdrop-blur-sm">

    <div
        class="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-[fadeIn_.25s_ease]">

        <!-- Header -->

        <div class="p-6 border-b border-slate-200 dark:border-slate-700">

            <div class="flex items-center justify-between">

                <div>

                    <h2 class="text-2xl font-bold">

                        Export Blog

                    </h2>

                    <p class="text-slate-500 mt-1">

                        Choose your preferred export format.

                    </p>

                </div>

                <button
                    id="closeExportModal"
                    class="w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-xl">

                    ✕

                </button>

            </div>

        </div>

        <!-- Body -->

        <div class="p-6 space-y-4">

            <a
                href="{% url 'export:markdown' blog.id %}"
                class="group flex items-center justify-between rounded-2xl border border-slate-200 dark:border-slate-700 p-5 hover:border-blue-600 hover:bg-blue-50 dark:hover:bg-slate-800 transition">

                <div class="flex gap-4">

                    <div class="text-3xl">

                        📄

                    </div>

                    <div>

                        <h3 class="font-semibold text-lg">

                            Markdown

                        </h3>

                        <p class="text-slate-500 text-sm">

                            Best for developers and GitHub.

                        </p>

                    </div>

                </div>

                <span class="text-blue-600">

                    →

                </span>

            </a>

            <a
                href="{% url 'export:html' blog.id %}"
                class="group flex items-center justify-between rounded-2xl border border-slate-200 dark:border-slate-700 p-5 hover:border-orange-500 hover:bg-orange-50 dark:hover:bg-slate-800 transition">

                <div class="flex gap-4">

                    <div class="text-3xl">

                        🌐

                    </div>

                    <div>

                        <h3 class="font-semibold text-lg">

                            HTML

                        </h3>

                        <p class="text-slate-500 text-sm">

                            Standalone webpage.

                        </p>

                    </div>

                </div>

                <span class="text-orange-600">

                    →

                </span>

            </a>

            <a
                href="{% url 'export:docx' blog.id %}"
                class="group flex items-center justify-between rounded-2xl border border-slate-200 dark:border-slate-700 p-5 hover:border-indigo-600 hover:bg-indigo-50 dark:hover:bg-slate-800 transition">

                <div class="flex gap-4">

                    <div class="text-3xl">

                        📝

                    </div>

                    <div>

                        <h3 class="font-semibold text-lg">

                            Microsoft Word

                        </h3>

                        <p class="text-slate-500 text-sm">

                            DOCX document.

                        </p>

                    </div>

                </div>

                <span class="text-indigo-600">

                    →

                </span>

            </a>

            <!--<button
                onclick="window.print()"
                class="w-full group flex items-center justify-between rounded-2xl border border-slate-200 dark:border-slate-700 p-5 hover:border-red-600 hover:bg-red-50 dark:hover:bg-slate-800 transition">

                <div class="flex gap-4">

                    <div class="text-3xl">

                        🖨

                    </div>

                    <div class="text-left">

                        <h3 class="font-semibold text-lg">

                            Print / Save PDF

                        </h3>

                        <p class="text-slate-500 text-sm">

                            Use your browser's PDF printer.

                        </p>

                    </div>

                </div>

                <span class="text-red-600">

                    →

                </span>

            </button>-->

        </div>

    </div>

</div>

<script>

const exportModal = document.getElementById("exportModal");

function openExportModal(){

    exportModal.classList.remove("hidden");

    exportModal.classList.add("flex");

}

function closeExportModal(){

    exportModal.classList.remove("flex");

    exportModal.classList.add("hidden");

}

document
.getElementById("closeExportModal")
.addEventListener(
    "click",
    closeExportModal
);

exportModal.addEventListener(
    "click",
    function(e){

        if(e.target===exportModal){

            closeExportModal();

        }

    }
);

document.addEventListener(

    "keydown",

    function(e){

        if(e.key==="Escape"){

            closeExportModal();

        }

    }

);

</script>
