<aside
id="sidebar"
class="hidden lg:flex w-72 flex-col bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800">

    <!-- Logo -->

    <div class="h-20 flex items-center px-8 border-b border-slate-200 dark:border-slate-800">

        <a
        href="/"
        class="flex items-center gap-3">

            <div
            class="w-11 h-11 rounded-xl bg-blue-600 text-white flex items-center justify-center text-xl font-bold">

                AI

            </div>

            <div>

                <h1 class="font-bold text-lg">

                    AI Blog

                </h1>

                <p class="text-xs text-slate-500">

                    Generator

                </p>

            </div>

        </a>

    </div>

    <!-- Navigation -->

    <nav class="flex-1 px-5 py-6 space-y-2">

        <a
        href="{% url 'blogs:dashboard' %}"
        class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-blue-50 dark:hover:bg-slate-800 transition">

            <i data-lucide="layout-dashboard"></i>

            Dashboard

        </a>

        <a
        href="{% url 'blogs:generate' %}"
        class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-blue-50 dark:hover:bg-slate-800 transition">

            <i data-lucide="sparkles"></i>

            Generate Blog

        </a>

        <a
        href="{% url 'blogs:my_blogs' %}"
        class="flex items-center gap-3 rounded-xl px-4 py-3 hover:bg-blue-50 dark:hover:bg-slate-800 transition">

            <i data-lucide="book-open"></i>

            My Blogs

        </a>


    </nav>

<div class="p-5 border-t border-slate-200 dark:border-slate-800">

    {% csrf_token %}

    <button
        id="logoutButton"
        type="button"
        class="w-full flex items-center justify-center gap-3 rounded-xl px-4 py-3 bg-red-50 text-red-600 hover:bg-red-100 dark:bg-red-900/20 dark:text-red-400 dark:hover:bg-red-900/30 transition">

        <i data-lucide="log-out"></i>

        Logout

    </button>

</div>
</aside>
