{% extends "authentication/base_auth.html" %}

{% block title %}
Signing In...
{% endblock %}

{% block auth_content %}

<div class="text-center">

    <div
        class="mx-auto w-20 h-20 rounded-3xl bg-blue-600 flex items-center justify-center text-white text-3xl font-bold">

        AI

    </div>

    <h1 class="mt-8 text-3xl font-bold">

        Signing You In...

    </h1>

    <p class="mt-3 text-slate-500">

        Please wait while we complete authentication.

    </p>

    <div class="mt-10 flex justify-center">

        <div
            class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin">

        </div>

    </div>

</div>

<script>

(async () => {

    console.log("========== OAuth Callback ==========");

    try {

        console.log("Getting Supabase session...");

        const {
            data,
            error
        } = await window.supabaseClient.auth.getSession();

        console.log("Session Data:", data);
        console.log("Session Error:", error);

        if (error) {

            throw error;

        }

        if (!data || !data.session) {

            throw new Error("No active Supabase session found.");

        }

        console.log("Access Token:");
        console.log(data.session.access_token);

        console.log("Creating Django session...");

        const response = await createDjangoSession(
            data.session.access_token
        );

        console.log("Create Session Response:");
        console.log(response);

        if (!response.success) {

            throw new Error(response.message);

        }

        console.log("Authentication successful.");

        console.log("Redirecting to dashboard...");

        window.location.href = window.DASHBOARD_URL;

    }

    catch (error) {

        console.error("OAuth Callback Error:");

        console.error(error);

        alert(error.message);

        window.location.href = window.LOGIN_URL;

    }

})();

</script>

{% endblock %}
