{% if blog.resources %}

<section id="resources" class="mb-20">

    <h2 class="text-4xl font-bold mb-10">

        📚 Resources

    </h2>

    <div class="grid md:grid-cols-2 gap-6">

        {% for resource in blog.resources %}

        <div
            class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm p-6">

            <h3
                class="text-xl font-bold">

                {{ resource.title }}

            </h3>

            {% if resource.description %}

            <p
                class="mt-3 text-slate-500">

                {{ resource.description }}

            </p>

            {% endif %}

            {% if resource.url %}

            <a
                href="{{ resource.url }}"
                target="_blank"
                class="inline-block mt-5 text-blue-600 font-semibold">

                Visit Resource →

            </a>

            {% endif %}

        </div>

        {% endfor %}

    </div>

</section>

{% endif %}
